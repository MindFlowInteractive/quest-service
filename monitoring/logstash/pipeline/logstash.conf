input {
  beats {
    port => 5044
  }
  
  tcp {
    port => 5000
    codec => json
  }
  
  udp {
    port => 5001
    codec => json
  }
}

filter {
  # Parse JSON logs
  if [message] {
    json {
      source => "message"
      target => "parsed"
    }
  }

  # Add service name from container
  if [container] {
    mutate {
      add_field => { "service" => "%{[container][name]}" }
    }
  }

  # Parse timestamp
  if [parsed][timestamp] {
    date {
      match => [ "[parsed][timestamp]", "ISO8601" ]
      target => "@timestamp"
    }
  }

  # Extract log level
  if [parsed][level] {
    mutate {
      add_field => { "log_level" => "%{[parsed][level]}" }
    }
  }

  # Clean up fields
  mutate {
    remove_field => [ "host", "agent", "ecs", "input", "log" ]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "quest-logs-%{+YYYY.MM.dd}"
    template_name => "quest-logs"
    template_pattern => "quest-logs-*"
    template => {
      "index_patterns" => ["quest-logs-*"],
      "settings" => {
        "number_of_shards" => 1,
        "number_of_replicas" => 0
      },
      "mappings" => {
        "properties" => {
          "@timestamp" => { "type" => "date" },
          "service" => { "type" => "keyword" },
          "log_level" => { "type" => "keyword" },
          "message" => { "type" => "text" },
          "parsed" => {
            "properties" => {
              "level" => { "type" => "keyword" },
              "message" => { "type" => "text" },
              "timestamp" => { "type" => "date" },
              "traceId" => { "type" => "keyword" },
              "spanId" => { "type" => "keyword" },
              "userId" => { "type" => "keyword" },
              "requestId" => { "type" => "keyword" }
            }
          }
        }
      }
    }
  }

  # Debug output
  stdout {
    codec => rubydebug
  }
}
