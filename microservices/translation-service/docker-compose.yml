version: '3.9'
services:
  translation-service:
    build: .
    ports:
      - "3008:3008"
    environment:
      - SERVICE_PORT=3008
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=translation_db
      - DB_SYNC=true
    depends_on:
      - postgres
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: translation_db
    ports:
      - "5433:5432"
