version: '3.9'
services:
  feature-flag-service:
    build: .
    ports:
      - "3010:3010"
    environment:
      - SERVICE_PORT=3010
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=feature_flag_db
      - DB_SYNC=true
    depends_on:
      - postgres
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: feature_flag_db
    ports:
      - "5435:5432"
